[pytest]
# pytest configuration for Jekyll site test suite

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Paths
testpaths = .
pythonpath = .

# Markers for test categorization
markers =
    unit: Unit tests (source files, no build required)
    integration: Integration tests (parse _site/ HTML)
    acceptance: Acceptance tests (HTTP server, verify pages)
    regression: Regression tests (detect unintended changes)
    e2e: End-to-end tests (Playwright browser automation)
    slow: Marks tests as slow (deselect with '-m "not slow"')

# Output options
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings

# Asyncio mode for pytest-asyncio
asyncio_mode = auto

# Timeout for browser tests (seconds)
timeout = 30
